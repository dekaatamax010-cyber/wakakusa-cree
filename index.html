<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>若草 / Creer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-dark:    #1e0a02;
      --color-mid:     #5a3018;
      --color-bg-modal: #faf3e0;
      --bg-texture:    url('./images/back.jpg'); /* 背景画像パス */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #dcd6c8;
      background-image: var(--bg-texture);
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Zen Old Mincho', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── 短冊エリア ── */
    .stage {
      padding: 40px 20px;
      display: flex;
      flex-direction: row;
      gap: 30px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .tanzaku-img {
      width: 150px; /* 必要に応じて調整してください */
      height: auto;
      cursor: pointer;
      transition: transform 0.3s ease, opacity 0.3s ease;
      filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.5));
    }

    .tanzaku-img:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    /* ── モーダル共通 ── */
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
      overflow-y: auto;
      padding: 40px 0;
      z-index: 100;
      background-color: rgba(220, 214, 200, 0.3);
      background-image: var(--bg-texture);
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .modal.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-inner {
      width: 90%;
      max-width: 480px;
      display: block;
      background-color: var(--color-bg-modal);
    }

    .modal-image-wrap { width: 100%; aspect-ratio: 4/3; overflow: hidden; }
    .modal-image { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }

    .modal-content { padding: 40px; }
    .modal-title { font-size: 1.6rem; color: var(--color-dark); margin-bottom: 8px; }
    .modal-text { font-size: 0.9rem; line-height: 2; color: var(--color-dark); margin-bottom: 30px; }

    .btn-reserve { display: block; text-align: center; border: 1px solid #2c2c2c; padding: 14px; color: var(--color-dark); text-decoration: none; margin-bottom: 10px; }
    .modal-back { display: block; width: 100%; padding: 20px 0; border: none; background: none; cursor: pointer; color: var(--color-mid); }
  </style>
</head>
<body>

  <div class="stage">
    <img src="./images/1238.png" alt="若草" class="tanzaku-img" onclick="openModal('wakakusa')">
    <img src="./images/1240.png" alt="Creer" class="tanzaku-img" onclick="openModal('cree')">
  </div>

  <div class="modal" id="modal-wakakusa" onclick="closeModal('wakakusa')">
    <div class="modal-inner" onclick="event.stopPropagation()">
      <div class="modal-image-wrap"><img class="modal-image" src="./images/unnamed.webp" alt="若草"></div>
      <div class="modal-content">
        <h2 class="modal-title">若草</h2>
        <p class="modal-text">灯りと器に囲まれた空間で、家庭料理と喫茶をお楽しみください。</p>
        <a class="btn-reserve" href="https://ig.me/m/creer_shizuoka" target="_blank">お席のご案内（DM）</a>
        <button class="modal-back" onclick="closeModal('wakakusa')">— 閉じる —</button>
      </div>
    </div>
  </div>

  <div class="modal" id="modal-cree" onclick="closeModal('cree')">
    <div class="modal-inner" onclick="event.stopPropagation()">
      <div class="modal-image-wrap"><img class="modal-image" src="./images/unnamed%20(2).jpg" alt="Creer"></div>
      <div class="modal-content">
        <h2 class="modal-title">Creer</h2>
        <p class="modal-text">器と、光と、静けさと。骨董品と工芸品が静かに並ぶ空間。</p>
        <a class="btn-reserve" href="https://ig.me/m/creer_shizuoka" target="_blank">Contact / DM</a>
        <button class="modal-back" onclick="closeModal('cree')">— 閉じる —</button>
      </div>
    </div>
  </div>

  <script>
    function openModal(name) {
      document.getElementById('modal-' + name).classList.add('active');
    }
    function closeModal(name) {
      document.getElementById('modal-' + name).classList.remove('active');
    }
  </script>
</body>
</html>
